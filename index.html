<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pomodoro-window">
            <div class="pomodoro-content">
                <div class="pomodoro-top">
                    <button class="close-button">X</button>
                </div>
                <div class="mode-buttons">
                    <button class="mode-work active" onclick="showWork()">Work</button>
                    <button class="mode-break inactive" onclick="showBreak()">Break</button>
                </div>
                <p class="messege">YOU CAN DO IT</p>
                <div class="timer">25:00</div>
                <img class="cat-gif" src="assets/pomodoro/cat-idle.gif">
                <div>
                    <button class="play-btn"> ▶</button>
                    <button class="reset-btn">↺ </button>
                </div>
            </div>
        </div>
<script src="script.js"></script>
</body>
</html>
